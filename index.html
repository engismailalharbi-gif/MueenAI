<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 3rem;
      position: relative;
      overflow: hidden;
    }

    /* ── Background image ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        url('https://images.pexels.com/photos/1586996/pexels-photo-1586996.jpeg?auto=compress&cs=tinysrgb&w=1920&q=80')
        center center / cover no-repeat;
      filter: brightness(.35) saturate(.8);
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 15% 50%, rgba(79,70,229,.25) 0%, transparent 55%),
        radial-gradient(ellipse 50% 50% at 85% 50%, rgba(124,58,237,.2) 0%, transparent 55%),
        linear-gradient(180deg, rgba(0,0,0,.3) 0%, rgba(0,0,0,.1) 50%, rgba(0,0,0,.4) 100%);
      z-index: 0;
    }

    /* ── Chat card ── */
    .chat-card {
      width: 100%;
      max-width: 26rem;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    @media (min-width: 640px) {
      .chat-card {
        height: calc(100vh - 3rem);
        margin: 1.5rem 0;
        border-radius: 1.25rem;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,.12);
        box-shadow:
          0 0 0 1px rgba(99,102,241,.15),
          0 32px 80px -12px rgba(0,0,0,.8),
          0 0 100px -20px rgba(99,102,241,.2);
        backdrop-filter: blur(2px);
      }
    }

    /* ── Header ── */
    .header {
      background: rgba(13,17,23,.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: relative;
    }

    .header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(99,102,241,.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .header-left { display: flex; align-items: center; gap: .875rem; }

    .logo {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: .875rem;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(99,102,241,.4);
      flex-shrink: 0;
    }

    .logo svg { width: 1.2rem; height: 1.2rem; color: #fff; }

    .header-text h1 {
      font-size: .9375rem;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -.02em;
    }

    .header-text p {
      font-size: .7rem;
      color: #64748b;
      margin-top: .1rem;
      font-weight: 500;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .7rem;
      font-weight: 600;
      padding: .375rem .875rem;
      border-radius: 9999px;
      background: rgba(16,185,129,.1);
      color: #34d399;
      border: 1px solid rgba(52,211,153,.2);
      letter-spacing: .03em;
    }

    .status-dot {
      width: .45rem;
      height: .45rem;
      border-radius: 50%;
      background: #34d399;
      animation: pulse-green 2s ease-in-out infinite;
    }

    @keyframes pulse-green {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(52,211,153,.4); }
      50%       { opacity: .8; box-shadow: 0 0 0 4px rgba(52,211,153,0); }
    }

    /* ── Error banner ── */
    .error-banner {
      display: none;
      background: rgba(239,68,68,.08);
      border-bottom: 1px solid rgba(239,68,68,.2);
      color: #fca5a5;
      font-size: .8125rem;
      padding: .625rem 1.25rem;
      display: none;
      align-items: center;
      gap: .5rem;
    }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      background: rgba(13,17,23,.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .chat-area::-webkit-scrollbar { width: 3px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 2px; }

    /* ── Empty state ── */
    .empty-state {
      margin: auto;
      text-align: center;
      padding: 2rem 1rem;
      max-width: 26rem;
      direction: rtl;
    }

    .empty-icon {
      width: 4.5rem;
      height: 4.5rem;
      border-radius: 1.5rem;
      background: linear-gradient(135deg, rgba(99,102,241,.15) 0%, rgba(168,85,247,.15) 100%);
      border: 1px solid rgba(99,102,241,.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 40px rgba(99,102,241,.1);
    }

    .empty-icon svg { width: 2rem; height: 2rem; color: #818cf8; }

    .empty-state h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: .5rem;
      letter-spacing: -.02em;
    }

    .empty-state p {
      font-size: .875rem;
      color: #475569;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .suggestions { display: flex; flex-direction: column; gap: .625rem; }

    .suggestion-btn {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.07);
      color: #94a3b8;
      font-size: .8125rem;
      padding: .75rem 1rem;
      border-radius: .875rem;
      cursor: pointer;
      text-align: right;
      transition: all .2s;
      font-family: inherit;
      display: flex;
      align-items: center;
      flex-direction: row-reverse;
      gap: .625rem;
      direction: rtl;
    }

    .suggestion-btn::before {
      content: '←';
      color: #6366f1;
      font-size: .875rem;
      flex-shrink: 0;
      transition: transform .2s;
    }

    .suggestion-btn:hover {
      border-color: rgba(99,102,241,.35);
      background: rgba(99,102,241,.06);
      color: #c7d2fe;
      transform: translateX(-3px);
    }

    .suggestion-btn:hover::before { transform: translateX(-2px); }

    /* ── Message bubbles ── */
    .msg { display: flex; align-items: flex-end; gap: .625rem; }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 1.875rem;
      height: 1.875rem;
      border-radius: .75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: .8rem;
    }

    .avatar.ai {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      box-shadow: 0 4px 10px rgba(99,102,241,.35);
    }

    .avatar.user {
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      box-shadow: 0 4px 10px rgba(14,165,233,.3);
    }

    .bubble-wrap { display: flex; flex-direction: column; max-width: 75%; }
    .msg.user .bubble-wrap { align-items: flex-end; }

    .bubble {
      padding: .75rem 1rem;
      border-radius: 1.125rem;
      font-size: .875rem;
      line-height: 1.65;
      word-break: break-word;
    }

    .bubble.ai {
      background: rgba(255,255,255,.04);
      color: #cbd5e1;
      border: 1px solid rgba(255,255,255,.07);
      border-bottom-left-radius: .25rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
    }

    .bubble.user {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: #fff;
      border-bottom-right-radius: .25rem;
      box-shadow: 0 4px 16px rgba(79,70,229,.35);
    }

    .timestamp {
      font-size: .65rem;
      color: #334155;
      margin-top: .375rem;
      padding: 0 .25rem;
      font-weight: 500;
      letter-spacing: .02em;
    }

    /* ── Loading dots ── */
    .dots { display: flex; gap: .35rem; padding: .25rem .125rem; align-items: center; }
    .dot {
      width: .4rem; height: .4rem;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      animation: bounce 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .5; }
      30%            { transform: translateY(-.4rem); opacity: 1; }
    }

    /* ── Input bar ── */
    .input-bar {
      background: rgba(13,17,23,.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,.08);
      padding: 1rem 1.25rem 1.25rem;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: .75rem;
      align-items: flex-end;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 1rem;
      padding: .5rem .5rem .5rem .875rem;
      transition: border-color .2s, box-shadow .2s;
    }

    .input-row:focus-within {
      border-color: rgba(99,102,241,.4);
      box-shadow: 0 0 0 3px rgba(99,102,241,.08), 0 0 20px rgba(99,102,241,.05);
    }

    textarea {
      flex: 1;
      resize: none;
      background: transparent;
      border: none;
      color: #e2e8f0;
      font-family: inherit;
      font-size: .875rem;
      outline: none;
      line-height: 1.5;
      max-height: 8rem;
      overflow-y: auto;
      padding: .375rem 0;
    }

    textarea::placeholder { color: #334155; }

    .send-btn {
      width: 2.375rem;
      height: 2.375rem;
      border-radius: .75rem;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .2s;
      box-shadow: 0 4px 12px rgba(99,102,241,.35);
    }

    .send-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, #4f46e5, #6d28d9);
      box-shadow: 0 6px 18px rgba(99,102,241,.45);
      transform: translateY(-1px);
    }

    .send-btn:active:not(:disabled) { transform: translateY(0); }
    .send-btn:disabled { opacity: .35; cursor: not-allowed; box-shadow: none; transform: none; }
    .send-btn svg { width: 1rem; height: 1rem; color: #fff; }

    .input-hint {
      text-align: center;
      font-size: .675rem;
      color: #1e293b;
      margin-top: .625rem;
      letter-spacing: .03em;
    }

    /* ── Demo badge ── */
    .demo-badge {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-size: .65rem;
      font-weight: 600;
      color: #f59e0b;
      background: rgba(245,158,11,.08);
      border: 1px solid rgba(245,158,11,.2);
      padding: .2rem .6rem;
      border-radius: 9999px;
      letter-spacing: .04em;
    }

    /* ── Spinner ── */
    .spin {
      width: .9rem; height: .9rem;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Fade-in animation ── */
    .msg { animation: fadeUp .25s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="chat-card">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
        </svg>
      </div>
      <div class="header-text">
        <h1>Support AI</h1>
        <p>Powered by Claude</p>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:.625rem;">
      <span class="demo-badge" id="demoBadge" style="display:none;">⚠ DEMO</span>
      <div class="status-pill">
        <span class="status-dot"></span>
        Online
      </div>
    </div>
  </header>

  <!-- Error banner -->
  <div class="error-banner" id="errorBanner">
    <svg style="width:1rem;height:1rem;flex-shrink:0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <span id="errorText"></span>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
      </div>
      <h2>كيف يمكننا مساعدتك؟</h2>
      <p>مساعدنا الذكي جاهز لخدمتك على مدار الساعة. اسأل أي شيء أو اختر من الاقتراحات أدناه.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion(this)">كيف أغير كلمة المرور؟</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">أين طلبي؟</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">أريد استرداد المبلغ.</button>
      </div>
    </div>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <div class="input-row">
      <textarea
        id="userInput"
        rows="1"
        placeholder="Type your message…"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="handleSend()" title="Send">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
        </svg>
      </button>
    </div>
    <p class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
  </div>

</div>

<script>
  const ANTHROPIC_API_KEY = 'sPw2As07i-SUzOWAwSEQdBhGY_EInd_GiaU';
  const DEMO_MODE = !ANTHROPIC_API_KEY.startsWith('sk-ant-');

  const chatArea    = document.getElementById('chatArea');
  const emptyState  = document.getElementById('emptyState');
  const userInput   = document.getElementById('userInput');
  const sendBtn     = document.getElementById('sendBtn');
  const errorBanner = document.getElementById('errorBanner');
  const errorText   = document.getElementById('errorText');
  const demoBadge   = document.getElementById('demoBadge');

  if (DEMO_MODE) demoBadge.style.display = 'inline-flex';

  let loading = false;
  const history = [];

  const SYSTEM_PROMPT = `You are a professional, empathetic customer support agent. Provide clear and helpful answers. Be concise. Use short paragraphs. If you don't know specific account details, acknowledge it and guide the customer to a human agent. Plain text only, no markdown.`;

  function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 128) + 'px';
  }

  function hideEmpty() {
    if (emptyState && emptyState.parentNode) emptyState.remove();
  }

  function scrollBottom() {
    requestAnimationFrame(() => { chatArea.scrollTop = chatArea.scrollHeight; });
  }

  function appendUserMsg(text) {
    hideEmpty();
    const el = document.createElement('div');
    el.className = 'msg user';
    el.innerHTML = `
      <div class="avatar user">🧑</div>
      <div class="bubble-wrap">
        <div class="bubble user">${escHtml(text)}</div>
        <span class="timestamp">${now()}</span>
      </div>`;
    chatArea.appendChild(el);
    scrollBottom();
  }

  function appendLoadingMsg() {
    const el = document.createElement('div');
    el.className = 'msg';
    el.id = 'loadingMsg';
    el.innerHTML = `
      <div class="avatar ai">🤖</div>
      <div class="bubble-wrap">
        <div class="bubble ai">
          <div class="dots">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          </div>
        </div>
      </div>`;
    chatArea.appendChild(el);
    scrollBottom();
  }

  function replaceLoadingWithAI(text) {
    const loader = document.getElementById('loadingMsg');
    if (!loader) return;
    loader.removeAttribute('id');
    loader.innerHTML = `
      <div class="avatar ai">🤖</div>
      <div class="bubble-wrap">
        <div class="bubble ai">${escHtml(text)}</div>
        <span class="timestamp">${now()}</span>
      </div>`;
    scrollBottom();
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  function setLoading(val) {
    loading = val;
    userInput.disabled = val;
    sendBtn.disabled = val;
    sendBtn.innerHTML = val
      ? '<span class="spin"></span>'
      : `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>`;
  }

  function showError(msg) {
    errorText.textContent = msg;
    errorBanner.style.display = 'flex';
    setTimeout(() => { errorBanner.style.display = 'none'; }, 5000);
  }

  async function handleSend() {
    const text = userInput.value.trim();
    if (!text || loading) return;

    errorBanner.style.display = 'none';
    userInput.value = '';
    autoResize(userInput);
    appendUserMsg(text);
    setLoading(true);
    appendLoadingMsg();

    try {
      history.push({ role: 'user', content: text });
      let reply;

      if (DEMO_MODE) {
        await new Promise(r => setTimeout(r, 900));
        reply = mockReply(text);
      } else {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': ANTHROPIC_API_KEY,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 1024,
            system: SYSTEM_PROMPT,
            messages: history
          })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error?.message || `HTTP ${res.status}`);
        }

        const data = await res.json();
        reply = data.content[0].text.trim();
      }

      history.push({ role: 'assistant', content: reply });
      replaceLoadingWithAI(reply);
    } catch (err) {
      history.pop();
      const loader = document.getElementById('loadingMsg');
      if (loader) loader.remove();
      showError(err.message || 'Failed to reach the AI. Please try again.');
    } finally {
      setLoading(false);
      userInput.focus();
    }
  }

  function sendSuggestion(btn) {
    userInput.value = btn.textContent.trim();
    handleSend();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  }

  function mockReply(text) {
    const t = text.toLowerCase();
    if (t.includes('السلام') || t.includes('مرحبا') || t.includes('هلا') || t.includes('hello') || t.includes('hi'))
      return 'وعليكم السلام! أنا هنا لمساعدتك. كيف يمكنني خدمتك اليوم؟';
    if (t.includes('كلمة') || t.includes('password') || t.includes('باسورد'))
      return 'لإعادة تعيين كلمة المرور، اذهب إلى صفحة تسجيل الدخول وانقر على "نسيت كلمة المرور". ستصلك رسالة بريد إلكتروني خلال دقائق.';
    if (t.includes('طلب') || t.includes('order') || t.includes('شحن'))
      return 'يمكنني البحث في طلبك. هل يمكنك مشاركة رقم الطلب؟ عادةً يبدأ بـ #ORD أو #INV.';
    if (t.includes('استرداد') || t.includes('refund') || t.includes('رجوع'))
      return 'تتم معالجة المبالغ المستردة خلال 5-7 أيام عمل. هل تريد بدء عملية الاسترداد لطلب معين؟';
    if (t.includes('شكر') || t.includes('thanks') || t.includes('ثانك'))
